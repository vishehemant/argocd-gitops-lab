apiVersion: v1
kind: Namespace
metadata:
  name: argocd-gitops-dev
  labels:
    name: argocd-gitops-dev
    environment: development
    managed-by: argocd
  annotations:
    description: "Development environment for ArgoCD GitOps Lab"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-quota
  namespace: argocd-gitops-dev
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "10Gi"
    limits.cpu: "20"
    limits.memory: "20Gi"
    pods: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: dev-limits
  namespace: argocd-gitops-dev
spec:
  limits:
  - max:
      cpu: "2"
      memory: "2Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    type: Container
  - max:
      cpu: "4"
      memory: "4Gi"
    min:
      cpu: "200m"
      memory: "256Mi"
    type: Pod

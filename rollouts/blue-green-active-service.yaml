apiVersion: v1
kind: Service
metadata:
  name: nodejs-active
  labels:
    app.kubernetes.io/name: nodejs-demo
    app.kubernetes.io/version: "18"
    app.kubernetes.io/component: webapp
    app.kubernetes.io/part-of: argocd-gitops-lab
spec:
  selector:
    app.kubernetes.io/name: nodejs-demo
    rollouts-pod-template-hash: active  # Argo Rollouts adds this label to active pods
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  type: ClusterIP
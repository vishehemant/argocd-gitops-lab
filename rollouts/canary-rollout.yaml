apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: nodejs-demo-canary
  labels:
    app.kubernetes.io/name: nodejs-demo
    app.kubernetes.io/version: "18"
    app.kubernetes.io/component: webapp
    app.kubernetes.io/part-of: argocd-gitops-lab
spec:
  replicas: 2
  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 100
      - pause: {}
  selector:
    matchLabels:
      app.kubernetes.io/name: nodejs-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nodejs-demo
        app.kubernetes.io/version: "18"
        app.kubernetes.io/component: webapp
        app.kubernetes.io/part-of: argocd-gitops-lab
    spec:
      containers:
      - name: nodejs
        image: node:18-alpine
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
      - name: nodejs-canary
        image: node:19-alpine
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
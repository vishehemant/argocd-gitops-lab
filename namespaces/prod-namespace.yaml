apiVersion: v1
kind: Namespace
metadata:
  name: argocd-gitops-prod
  labels:
    name: argocd-gitops-prod
    environment: production
    managed-by: argocd
  annotations:
    description: "Production environment for ArgoCD GitOps Lab"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: prod-quota
  namespace: argocd-gitops-prod
spec:
  hard:
    requests.cpu: "50"
    requests.memory: "50Gi"
    limits.cpu: "100"
    limits.memory: "100Gi"
    pods: "200"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: prod-limits
  namespace: argocd-gitops-prod
spec:
  limits:
  - max:
      cpu: "4"
      memory: "4Gi"
    min:
      cpu: "200m"
      memory: "256Mi"
    type: Container
  - max:
      cpu: "8"
      memory: "8Gi"
    min:
      cpu: "400m"
      memory: "512Mi"
    type: Pod

apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  repositories: |
    - type: git
      url: https://github.com/your-repo/argocd-gitops-lab.git
      name: argocd-gitops-lab
      username: your-username
      password: your-password
  server: |
    - url: https://argocd-server.your-domain.com
      insecure: true
  dex: |
    - type: gitlab
      name: GitLab
      config:
        clientID: your-client-id
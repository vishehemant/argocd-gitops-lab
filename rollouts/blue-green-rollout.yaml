apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: nodejs-blue-green
  labels:
    app.kubernetes.io/name: nodejs-demo
    app.kubernetes.io/version: "18"
    app.kubernetes.io/component: webapp
    app.kubernetes.io/part-of: argocd-gitops-lab
spec:
  replicas: 2
  strategy:
    blueGreen:
      activeService: nodejs-active
      previewService: nodejs-preview
      autoPromotionEnabled: false
      steps:
      - setWeight: 100
      - pause: {}
  selector:
    matchLabels:
      app.kubernetes.io/name: nodejs-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nodejs-demo
        app.kubernetes.io/version: "18"
        app.kubernetes.io/component: webapp
        app.kubernetes.io/part-of: argocd-gitops-lab
    spec:
      containers:
      - name: nodejs
        image: node:18-alpine
        command: ["node"]
        args:
          - -e
          - |
            require('http')
              .createServer((req,res)=>res.end("Hello from NodeJS Blue-Green"))
              .listen(3000)
        ports:
        - containerPort: 3000
  revisionHistoryLimit: 10
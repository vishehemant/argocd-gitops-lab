apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-demo
  labels:
    app.kubernetes.io/name: nodejs-demo
    app.kubernetes.io/version: "18"
    app.kubernetes.io/component: webapp
    app.kubernetes.io/part-of: argocd-gitops-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nodejs-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nodejs-demo
        app.kubernetes.io/version: "18"
        app.kubernetes.io/component: webapp
        app.kubernetes.io/part-of: argocd-gitops-lab
    spec:
      containers:
      - name: nodejs
        image: node:18-alpine
        ports:
        - containerPort: 3000
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
      external_labels:
        cluster: 'production'
        environment: 'prod'
        region: 'us-east-1'

    # Alert manager configuration
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager:9093

    # Rule files
    rule_files:
      - '/etc/prometheus/rules/*.yaml'

    scrape_configs:
      # ==========================================
      # ArgoCD Metrics
      # ==========================================
      - job_name: 'argocd-metrics'
        scrape_interval: 30s
        static_configs:
          - targets: ['argocd-metrics.argocd:8082']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            replacement: 'argocd-metrics'

      - job_name: 'argocd-server'
        scrape_interval: 30s
        static_configs:
          - targets: ['argocd-server.argocd:8083']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            replacement: 'argocd-server'

      - job_name: 'argocd-repo-server'
        scrape_interval: 30s
        static_configs:
          - targets: ['argocd-repo-server.argocd:8084']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            replacement: 'argocd-repo-server'

      - job_name: 'argocd-application-controller'
        scrape_interval: 30s
        static_configs:
          - targets: ['argocd-application-controller.argocd:8085']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            replacement: 'argocd-application-controller'

      # ==========================================
      # Kubernetes Metrics (via Prometheus Operator)
      # ==========================================
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics

      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: 'true'
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

      # ==========================================
      # Application Metrics (Node.js, Prometheus)
      # ==========================================
      - job_name: 'nodejs-app'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - argocd-gitops-dev
                - argocd-gitops-prod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: 'nodejs-demo'
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: '3000'
          - source_labels: [__address__]
            target_label: __address__
            replacement: $1:3000
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)

      - job_name: 'prometheus'
        static_configs:
          - targets:
              - 'prometheus.monitoring:9090'

      # ==========================================
      # System Metrics (Node Exporter)
      # ==========================================
      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_endpoints_name]
            action: keep
            regex: 'node-exporter'

      # ==========================================
      # Service Metrics (Kubelet)
      # ==========================================
      - job_name: 'kubelet'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

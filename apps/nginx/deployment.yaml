apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-demo
  labels:
    app.kubernetes.io/name: nodejs-demo
    app.kubernetes.io/version: "18"
    app.kubernetes.io/component: webapp
    app.kubernetes.io/part-of: argocd-gitops-lab
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nodejs-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nodejs-demo
        app.kubernetes.io/version: "18"
        app.kubernetes.io/component: webapp
        app.kubernetes.io/part-of: argocd-gitops-lab
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: nodejs-demo
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: nodejs
        image: node:20-alpine
        imagePullPolicy: IfNotPresent
        command: ["node"]
        args:
          - -e
          - |
            require('http')
              .createServer((req,res)=>res.end("Hello from NodeJS Rollout"))
              .listen(3000)
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      terminationGracePeriodSeconds: 30

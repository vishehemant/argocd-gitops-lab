apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-gitops-app-reader-binding
  labels:
    app.kubernetes.io/part-of: argocd-gitops-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-gitops-app-reader
subjects:
- kind: ServiceAccount
  name: nodejs-app-sa
  namespace: argocd-gitops-dev
- kind: ServiceAccount
  name: nodejs-app-sa
  namespace: argocd-gitops-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-binding
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: argocd-gitops-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-rbac
subjects:
- kind: ServiceAccount
  name: prometheus-sa
  namespace: argocd-gitops-dev
- kind: ServiceAccount
  name: prometheus-sa
  namespace: argocd-gitops-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nodejs-app-role
  namespace: argocd-gitops-dev
  labels:
    app.kubernetes.io/name: nodejs-app
    app.kubernetes.io/part-of: argocd-gitops-lab
rules:
# Pod self-read permissions
- apiGroups: [""]
  resources: ["pods"]
  resourceNames: []
  verbs: ["get"]
# ConfigMap read for app configuration
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
  # Restrict to specific configmaps if needed
  # resourceNames: ["app-config"]
---
